name: InspectoRepo Analysis

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run InspectoRepo analysis
        run: node packages/cli/dist/index.js analyze . --dirs packages,apps --group-by package --format md --out inspectorepo-report.md

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: inspectorepo-report
          path: inspectorepo-report.md
          retention-days: 30

      - name: Extract report summary
        id: summary
        run: |
          RESULT=$(npx tsx scripts/extract-report-summary.ts inspectorepo-report.md)
          echo "json=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Post PR comment with analysis summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const raw = '${{ steps.summary.outputs.json }}';
            let parsed;
            try {
              parsed = raw && raw !== 'null' ? JSON.parse(raw) : null;
            } catch {
              parsed = null;
            }

            const marker = '<!-- inspectorepo-analysis -->';
            let body;

            if (parsed) {
              const lines = [
                marker,
                '## 🔍 InspectoRepo Analysis',
                '',
                '| Metric | Value |',
                '|--------|-------|',
                `| Score | **${parsed.score}/100** |`,
                `| Total Issues | ${parsed.totalIssues} |`,
                `| 🔴 Errors | ${parsed.errors} |`,
                `| 🟡 Warnings | ${parsed.warnings} |`,
                `| 🔵 Info | ${parsed.info} |`,
                '',
              ];

              // Package highlights
              if (parsed.packages && parsed.packages.length > 0) {
                lines.push('### 📦 Package Highlights');
                lines.push('');
                lines.push('| Package | Score | Issues |');
                lines.push('|---------|-------|--------|');
                for (const pkg of parsed.packages) {
                  const icon = pkg.score >= 80 ? '✅' : pkg.score >= 50 ? '⚠️' : '🔴';
                  lines.push(`| ${icon} ${pkg.name} | **${pkg.score}/100** | ${pkg.issues} |`);
                }
                lines.push('');
              }

              // Top rules
              if (parsed.topRules && parsed.topRules.length > 0) {
                lines.push('### 🏷️ Top Rules by Issue Count');
                lines.push('');
                for (const r of parsed.topRules) {
                  lines.push(`- \`${r.rule}\` — ${r.count} issue(s)`);
                }
                lines.push('');
              }

              // Top affected package
              if (parsed.packages && parsed.packages.length > 0) {
                const topPkg = parsed.packages.slice().sort((a, b) => b.issues - a.issues)[0];
                if (topPkg && topPkg.issues > 0) {
                  lines.push(`**Top affected package:** ${topPkg.name} (${topPkg.issues} issues)`);
                  lines.push('');
                }
              }

              lines.push('> Full report available as a workflow artifact.');
              body = lines.join('\n');
            } else {
              body = [
                marker,
                '## 🔍 InspectoRepo Analysis',
                '',
                '⚠️ Could not parse the analysis summary. Full report is available as a workflow artifact.',
              ].join('\n');
            }

            // Find and update existing bot comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
