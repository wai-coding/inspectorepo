name: InspectoRepo Analysis

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run InspectoRepo analysis
        run: node packages/cli/dist/index.js analyze . --dirs packages,apps --format md --out inspectorepo-report.md

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: inspectorepo-report
          path: inspectorepo-report.md
          retention-days: 30

      - name: Post PR comment with analysis summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('inspectorepo-report.md', 'utf-8');

            // Parse the markdown summary table produced by buildMarkdownReport()
            // Table format:
            // | Metric | Value |
            // |---|---|
            // | Score | **82/100** |
            // | Total issues | 5 |
            // | 🔴 Errors | 1 |
            // | 🟡 Warnings | 2 |
            // | 🔵 Info | 2 |
            const tableRows = new Map();
            for (const line of report.split('\n')) {
              const m = line.match(/^\|\s*(.+?)\s*\|\s*(.+?)\s*\|$/);
              if (m) {
                const key = m[1].replace(/^[🔴🟡🔵]\s*/, '').trim().toLowerCase();
                tableRows.set(key, m[2].trim());
              }
            }

            const scoreRaw = tableRows.get('score');
            const scoreMatch = scoreRaw && scoreRaw.match(/\*{0,2}(\d+)\s*\/\s*100\*{0,2}/);
            const totalRaw = tableRows.get('total issues');
            const errorsRaw = tableRows.get('errors');
            const warningsRaw = tableRows.get('warnings');
            const infoRaw = tableRows.get('info');

            const parsed = scoreMatch && totalRaw && errorsRaw && warningsRaw && infoRaw;

            const marker = '<!-- inspectorepo-analysis -->';
            let body;

            if (parsed) {
              const score = scoreMatch[1];
              const totalIssues = totalRaw;
              const errors = errorsRaw;
              const warnings = warningsRaw;
              const infos = infoRaw;

              body = [
                marker,
                '## 🔍 InspectoRepo Analysis',
                '',
                '| Metric | Value |',
                '|--------|-------|',
                `| Score | **${score}/100** |`,
                `| Total Issues | ${totalIssues} |`,
                `| 🔴 Errors | ${errors} |`,
                `| 🟡 Warnings | ${warnings} |`,
                `| 🔵 Info | ${infos} |`,
                '',
                '> Full report available as a workflow artifact.',
              ].join('\n');
            } else {
              body = [
                marker,
                '## 🔍 InspectoRepo Analysis',
                '',
                'InspectoRepo analysis completed. Full report is available as a workflow artifact.',
              ].join('\n');
            }

            // Find and update existing bot comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
