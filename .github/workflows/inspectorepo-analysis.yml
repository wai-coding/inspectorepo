name: InspectoRepo Analysis

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run InspectoRepo analysis
        run: node packages/cli/dist/index.js analyze . --dirs packages,apps --format md --out inspectorepo-report.md

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: inspectorepo-report
          path: inspectorepo-report.md
          retention-days: 30

      - name: Extract report summary
        id: summary
        run: |
          RESULT=$(npx tsx scripts/extract-report-summary.ts inspectorepo-report.md)
          echo "json=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Post PR comment with analysis summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const raw = '${{ steps.summary.outputs.json }}';
            const parsed = raw && raw !== 'null' ? JSON.parse(raw) : null;

            const marker = '<!-- inspectorepo-analysis -->';
            let body;

            if (parsed) {
              body = [
                marker,
                '## 🔍 InspectoRepo Analysis',
                '',
                '| Metric | Value |',
                '|--------|-------|',
                `| Score | **${parsed.score}/100** |`,
                `| Total Issues | ${parsed.totalIssues} |`,
                `| 🔴 Errors | ${parsed.errors} |`,
                `| 🟡 Warnings | ${parsed.warnings} |`,
                `| 🔵 Info | ${parsed.info} |`,
                '',
                '> Full report available as a workflow artifact.',
              ].join('\n');
            } else {
              body = [
                marker,
                '## 🔍 InspectoRepo Analysis',
                '',
                'InspectoRepo analysis completed. Full report is available as a workflow artifact.',
              ].join('\n');
            }

            // Find and update existing bot comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
