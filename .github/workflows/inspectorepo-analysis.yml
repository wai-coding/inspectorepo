name: InspectoRepo Analysis

on:
  pull_request:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run InspectoRepo analysis
        run: node packages/cli/dist/index.js analyze . --dirs packages,apps --format md --out inspectorepo-report.md

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: inspectorepo-report
          path: inspectorepo-report.md
          retention-days: 30

      # TODO: Add PR comment step to post report summary directly on the pull request
